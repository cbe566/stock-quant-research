name: 每日全球股票篩選（平行版）

on:
  schedule:
    # 台北 05:00 = UTC 21:00，預留充足時間給 07:30 發送
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  CI: 'true'
  GITHUB_ACTIONS: 'true'
  WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
  ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
  TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
  FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
  TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
  EOD_API_KEY: ${{ secrets.EOD_API_KEY }}

jobs:
  # ===== 第一階段：4 市場平行篩選 =====
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        market: [美股, 港股, 台股, 日股]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴
        run: pip install yfinance pandas numpy requests lxml html5lib openpyxl

      - name: 篩選 ${{ matrix.market }}
        run: |
          python3 daily_screening.py --market "${{ matrix.market }}" --output-json "screening_${{ matrix.market }}.json"
        timeout-minutes: 12

      - name: 上傳結果
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.market }}
          path: screening_${{ matrix.market }}.json
          retention-days: 1

  # ===== 第二階段：合併 + 報告 + 上傳 =====
  merge-and-publish:
    needs: screen
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝依賴
        run: pip install yfinance pandas numpy requests lxml html5lib openpyxl

      - name: 下載所有市場結果
        uses: actions/download-artifact@v4
        with:
          path: market_results
          pattern: result-*
          merge-multiple: true

      - name: 合併結果 + 生成報告 + 上傳 D1
        env:
          WORKER_API_KEY: ${{ secrets.WORKER_API_KEY }}
        run: python3 merge_and_upload.py

      - name: 檢查報告
        run: |
          if [ -f "每日篩選報告_最新.md" ]; then
            echo "### 每日篩選報告已生成" >> $GITHUB_STEP_SUMMARY
            head -100 "每日篩選報告_最新.md" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 提交報告到 GitHub
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add daily_reports/ "每日篩選報告_最新.md" || true
          if git diff --staged --quiet; then
            echo "沒有新的變更"
          else
            DATE=$(TZ='Asia/Taipei' date +"%Y-%m-%d")
            git commit -m "每日篩選報告 ${DATE} — 4 市場平行篩選"
            git push
          fi
